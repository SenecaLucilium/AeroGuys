[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
pythonpath = src
# importlib исключает конфликт пакета tests/api/ и src/api/
importmode = importlib

# Маркеры
markers =
    integration: тесты, требующие реального PostgreSQL (INTEGRATION_TESTS=1)
    unit: быстрые изолированные тесты без внешних зависимостей
    api: тесты HTTP-эндпоинтов с моками
